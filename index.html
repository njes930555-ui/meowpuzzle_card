<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meow Puzzle Card</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
      text-align: center;
    }
    img {
      max-width: 420px;
      width: 100%;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 16px;
    }
    .status {
      white-space: pre-wrap;
      margin-top: 16px;
      color: #bbb;
    }
    .stats {
      margin-top: 16px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>角色卡</h1>
    <div id="roleName">尚未建立角色</div>
    <div id="stats" class="stats"></div>
    <div id="status" class="status"></div>
    <img id="img" alt="角色圖">
  </div>

<script>
const API = "https://gas-proxy.njes930555.workers.dev/";
const BASE_URL = location.origin + location.pathname;

function qs(name) {
  return new URLSearchParams(location.search).get(name);
}

function savePlayerId(id) {
  localStorage.setItem("mp_playerId", id);
}

function loadPlayerId() {
  return localStorage.getItem("mp_playerId");
}

async function callApi(payload) {
  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  return await res.json();
}

function setStatus(text) {
  document.getElementById("status").textContent = text || "";
}

function renderPlayer(player) {
  document.getElementById("roleName").textContent = player.roleName || player.roleId || "角色";
  document.getElementById("stats").innerHTML = `
    力量 STR：${player.str}<br>
    智慧 INT：${player.int}<br>
    魅力 CHA：${player.cha}<br>
    黑暗值 DARK：${player.dark}<br>
    階段 Stage：${player.stage}
  `;

  const img = document.getElementById("img");

  if (player.image && player.image.mode === "preset" && player.image.url) {
    img.src = player.image.url;
    img.style.display = "block";
  } else if (player.image && player.image.mode === "api" && player.image.b64) {
    img.src = "data:image/png;base64," + player.image.b64;
    img.style.display = "block";
  }
}

async function handleStart(roleId) {
  setStatus("建立初始角色中...");
  const data = await callApi({
    action: "start",
    roleId: roleId
  });

  if (!data.ok) throw new Error(data.error || "start failed");

  savePlayerId(data.player.playerId);
  renderPlayer(data.player);
  setStatus("初始角色已建立。");
  history.replaceState({}, "", BASE_URL);
}

async function handleEvent(eventId) {
  const playerId = loadPlayerId();
  if (!playerId) {
    setStatus("尚未建立角色，請先掃描初始角色 QR。");
    return;
  }

  setStatus("套用事件中...");
  const data = await callApi({
    action: "event",
    playerId: playerId,
    eventId: eventId
  });

  if (!data.ok) throw new Error(data.error || "event failed");

  renderPlayer(data.player);

  if (data.skipped) {
    setStatus("此事件已使用過。");
  } else {
    setStatus("事件已套用。");
  }

  history.replaceState({}, "", BASE_URL);
}

async function loadCurrentPlayer() {
  const playerId = loadPlayerId();
  if (!playerId) return;

  const data = await callApi({
    action: "get",
    playerId: playerId
  });

  if (data.ok) {
    renderPlayer(data.player);
  }
}

window.addEventListener("load", async () => {
  try {
    const start = qs("start");
    const event = qs("event");

    if (start) {
      await handleStart(start);
      return;
    }

    if (event) {
      await handleEvent(event);
      return;
    }

    await loadCurrentPlayer();
  } catch (err) {
    console.error(err);
    setStatus("錯誤：" + err.message);
  }
});
</script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>即時角色產圖 MVP</title>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif; padding: 16px; }
    label { display:block; margin-top: 12px; }
    select, input, textarea, button { width: 100%; padding: 10px; font-size: 16px; margin-top: 6px; }
    button { cursor: pointer; }
    img { width: 100%; max-width: 520px; margin-top: 16px; border-radius: 12px; display:none; }
    .hint { color:#555; font-size: 13px; margin-top: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>🎭 即時角色產圖 MVP</h2>

  <label>職業</label>
  <select id="job">
    <option value="steampunk alchemist">煉金術士（蒸汽龐克）</option>
    <option value="fantasy knight">騎士（奇幻）</option>
    <option value="mystic oracle">占卜師（神秘）</option>
    <option value="cyberpunk hacker">駭客（賽博龐克）</option>
  </select>

  <label>黑暗值 (0-10)</label>
  <input id="dark" type="number" min="0" max="10" value="2" />

  <label>加一句特色（可空白）</label>
  <textarea id="extra" rows="3" placeholder="例：貓爪徽章、單片眼鏡、披風…"></textarea>

  <button id="go">生成角色圖</button>
  <div class="hint" id="status"></div>

  <img id="img" alt="generated" />

<script>
  // 換成你的 Cloudflare Worker URL
  const API = "https://gas-proxy.njes930555.workers.dev/";

  function buildPrompt(){
    const job = document.getElementById("job").value;
    const dark = Number(document.getElementById("dark").value || 0);
    const extra = (document.getElementById("extra").value || "").trim();

    const vibe =
      dark >= 7 ? "corrupted by shadow magic, ominous aura, darker outfit"
      : dark >= 4 ? "slightly dark mystical tone, subtle shadow motifs"
      : "heroic, clean design, hopeful tone";

    return [
      "RPG character portrait, centered, high quality,",
      job + ",",
      vibe + ",",
      "plain background, no text, no watermark,",
      extra ? ("details: " + extra) : ""
    ].join(" ");
  }

  document.getElementById("go").addEventListener("click", async () => {
    const status = document.getElementById("status");
    const img = document.getElementById("img");

    img.style.display = "none";
    img.src = "";
    status.textContent = "⏳ 生成中…（5-15秒，視網路與模型而定）";

    const prompt = buildPrompt();

    try {
      const r = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, size: "1024x1024" })
      });

      const j = await r.json();
      if (!j.ok) throw new Error(j.error || ("HTTP " + r.status));

      img.src = "data:image/png;base64," + j.b64;
      img.style.display = "block";
      status.textContent = "✅ 完成！可長按圖片保存。\n\nPrompt：\n" + prompt;
    } catch (e) {
      status.textContent = "❌ 失敗：" + e.message;
    }
  });
</script>
</body>
</html>
